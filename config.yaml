data:
  raw_path: "data/raw"
  processed_data : "data/processed"
  logs: "logs"

ingestion:
  file_types:
    - ".pdf"
    - ".html"
    - ".htm"

  pdf_strategy: "fast_first"

  fast_min_char_ratio: 0.05
  fast_min_absolute_chars: 500

  allow_hi_res_fallback: true

  languages:
    - "eng"

  min_text_length: 50

  # Remove repeated header/footer lines that occur on most pages
  dedupe_repeated_lines: true
  dedupe_min_pages: 10
  dedupe_min_line_length: 25
  dedupe_max_line_length: 220
  dedupe_ratio_threshold: 0.6

  skip_categories:
    - "Image"
    - "Figure"

  fail_on_quality_issues: false

  extract_metadata: true

  output_format: "json"

  logging:
  level: "INFO"
  file: "logs/ingestion.log"
