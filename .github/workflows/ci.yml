name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --dev --extra observability

      - name: Smoke import
        run: |
          uv run python -c "from src.api.main import app; assert app.title"
          uv run python -m src.cli doctor --json

      - name: Tests
        env:
          API_AUTH_ENABLED: "false"
          LANGFUSE_ENABLED: "false"
        run: uv run pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t regulatory-compliance-api:ci .